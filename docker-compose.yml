services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
